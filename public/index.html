<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC26 Match Center</title>
<style>
  :root {
    --bg: #0a0e13; --panel: #131a26; --panel2: #0e1520; --line: #213044;
    --text: #e8eef5; --dim: #7e93ab; --accent: #34d399; --gold: #fbbf24;
    --red: #f87171; --blue: #60a5fa;
    --pitch1: #1a4731; --pitch2: #15402b; --pitchline: rgba(255,255,255,.25);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: radial-gradient(1400px 700px at 70% -10%, #101d31 0%, var(--bg) 55%);
    color: var(--text); font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
    min-height: 100vh; padding: 22px 18px 60px;
  }
  .wrap { max-width: 1340px; margin: 0 auto; }
  header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  h1 { font-size: 22px; letter-spacing: 1px; }
  h1 .ball { color: var(--accent); }
  header .sub { color: var(--dim); font-size: 12px; }
  .card {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line); border-radius: 14px; padding: 16px;
  }
  .card h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); margin-bottom: 12px; }
  .layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 14px; align-items: start; }
  @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
  label { display: block; font-size: 11px; color: var(--dim); margin: 10px 0 4px; }
  select, textarea, input[type=text], input[type=number] {
    width: 100%; background: #0a1018; color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 9px; font: inherit;
  }
  select:focus, textarea:focus, input:focus { outline: 1px solid var(--accent); }

  /* style segmented control */
  .seg { display: flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg button { flex: 1; background: #0a1018; border: none; color: var(--dim); padding: 7px 0; cursor: pointer; font-size: 14px; }
  .seg button + button { border-left: 1px solid var(--line); }
  .seg button.on { background: var(--accent); color: #06281c; font-weight: 700; }
  .seg button:hover:not(.on) { color: var(--text); }
  .styleName { text-align: center; font-size: 11px; color: var(--gold); margin-top: 4px; letter-spacing: 1px; }

  /* pitch */
  .pitch {
    position: relative; margin-top: 12px; border-radius: 10px; overflow: hidden;
    background:
      repeating-linear-gradient(0deg, var(--pitch1) 0 36px, var(--pitch2) 36px 72px);
    border: 1px solid #2a5a40; aspect-ratio: 3 / 4;
  }
  .pitch svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .chip {
    position: absolute; transform: translate(-50%, -50%); width: 76px; text-align: center;
  }
  .chip input {
    width: 100%; background: rgba(7,14,11,.78); border: 1px solid rgba(255,255,255,.18);
    color: #fff; font-size: 10.5px; text-align: center; border-radius: 7px; padding: 4px 3px;
  }
  .chip input:focus { border-color: var(--accent); outline: none; }
  .chip .pos { font-size: 9px; color: rgba(255,255,255,.75); letter-spacing: 1px; text-shadow: 0 1px 2px #000; }
  .loadRow { display: flex; gap: 6px; margin-top: 10px; }
  .loadRow input { flex: 1; }
  .chip .ovr {
    position: absolute; top: 8px; right: -7px; min-width: 19px; height: 17px; line-height: 17px;
    border-radius: 5px; font-size: 10px; font-weight: 800; color: #1a1408; padding: 0 2px;
    background: #9aa4b2; display: none;
  }
  .chip .ovr.gold { background: linear-gradient(180deg, #f5d77a, #c9a13b); }
  .chip .ovr.silver { background: linear-gradient(180deg, #d9dee5, #9aa4b2); }
  .chip .ovr.bronze { background: linear-gradient(180deg, #d9a06b, #a06536); }

  /* FIFA-style player card */
  #pcard {
    position: fixed; z-index: 50; width: 230px; display: none; pointer-events: none;
    border-radius: 12px; padding: 12px; border: 1px solid #5a4a1e;
    background: linear-gradient(160deg, #2b2410 0%, #171309 60%, #0d0b06 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,.6);
  }
  #pcard.silver { border-color: #4a5462; background: linear-gradient(160deg, #232a33 0%, #12161c 60%, #0a0d11 100%); }
  #pcard .top { display: flex; gap: 10px; align-items: center; }
  #pcard img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 2px 4px #000); }
  #pcard .big { font-size: 30px; font-weight: 900; color: var(--gold); line-height: 1; }
  #pcard.silver .big { color: #d9dee5; }
  #pcard .pos { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
  #pcard .nm { font-weight: 700; font-size: 14px; margin-top: 2px; }
  #pcard .meta { font-size: 10.5px; color: var(--dim); margin: 6px 0 8px; }
  #pcard .sgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px; }
  #pcard .srow { display: flex; align-items: center; gap: 5px; font-size: 10.5px; }
  #pcard .srow .k { width: 26px; color: var(--dim); font-weight: 700; }
  #pcard .srow .v { width: 18px; text-align: right; font-weight: 800; }
  #pcard .srow .t { flex: 1; height: 4px; background: #00000066; border-radius: 2px; overflow: hidden; }
  #pcard .srow .f { height: 100%; border-radius: 2px; }
  .btn { background: #0a1018; border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); }

  /* prediction center */
  .matchTitle { font-size: 19px; font-weight: 600; text-align: center; margin-bottom: 4px; }
  .matchTitle .elo { color: var(--dim); font-size: 12px; font-weight: 400; }
  .probRow { display: flex; align-items: center; gap: 10px; margin: 9px 0; }
  .probRow .lbl { width: 105px; font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .barTrack { flex: 1; height: 24px; background: #0a1018; border-radius: 6px; position: relative; overflow: hidden; }
  .barFill { height: 100%; border-radius: 6px; transition: width .25s; }
  .barGhost { position: absolute; top: 0; height: 100%; border-right: 2px dashed rgba(255,255,255,.5); }
  .probRow .val { width: 56px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
  .winA .barFill { background: linear-gradient(90deg, #10b981, #34d399); }
  .draw .barFill { background: linear-gradient(90deg, #475569, #64748b); }
  .winB .barFill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .statChips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; justify-content: center; }
  .chip2 { background: #0a1018; border: 1px solid var(--line); border-radius: 8px; padding: 5px 11px; font-size: 12px; }
  .chip2 b { color: var(--gold); }
  .scores { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; justify-content: center; }
  .score { background: #0a1018; border: 1px solid var(--line); border-radius: 8px; padding: 7px 11px; text-align: center; min-width: 64px; }
  .score .s { font-size: 16px; font-weight: 700; }
  .score .p { font-size: 11px; color: var(--accent); }
  .baselineNote { margin-top: 10px; font-size: 11px; color: var(--dim); text-align: center; }
  .cornersCard { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
  .cornersGrid { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
  .saveBtn {
    width: 100%; margin-top: 14px; padding: 11px; border: none; border-radius: 8px;
    background: var(--accent); color: #06281c; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .saveBtn:hover { filter: brightness(1.1); }

  /* intel */
  .intelGrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 14px; }
  @media (max-width: 1100px) { .intelGrid { grid-template-columns: 1fr; } }
  .pillRow { display: flex; align-items: center; gap: 5px; margin: 5px 0; font-size: 12px; }
  .pillRow .tag { color: var(--dim); width: 52px; font-size: 11px; }
  .pill { width: 20px; height: 20px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
  .pill.W { background: #10b98133; color: #34d399; border: 1px solid #10b98166; }
  .pill.D { background: #64748b33; color: #94a3b8; border: 1px solid #64748b66; }
  .pill.L { background: #ef444433; color: #f87171; border: 1px solid #ef444466; }
  .pillRow .agg { margin-left: auto; color: var(--dim); font-size: 11px; }
  .formList { margin-top: 8px; font-size: 11px; color: var(--dim); }
  .formList div { padding: 2px 0; border-bottom: 1px dashed #1a2636; display: flex; gap: 6px; }
  .formList .r { font-weight: 800; width: 12px; }
  .formList .r.W { color: var(--accent); } .formList .r.D { color: #94a3b8; } .formList .r.L { color: var(--red); }
  .h2hRow { display: flex; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px dashed #1a2636; }
  .h2hRow .sc { font-weight: 800; color: var(--gold); }
  .empty { color: var(--dim); font-size: 12px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  th { text-align: left; color: var(--dim); font-weight: 500; padding: 5px 7px; border-bottom: 1px solid var(--line); }
  td { padding: 6px 7px; border-bottom: 1px solid #16202e; font-variant-numeric: tabular-nums; }
  td .hit { color: var(--accent); } td .miss { color: var(--red); }
  .actualIn { width: 32px; text-align: center; padding: 3px; }
  .okBtn { background: var(--line); border: none; color: var(--text); border-radius: 5px; padding: 3px 8px; cursor: pointer; }
  .logCard { margin-top: 14px; }
  .toast { position: fixed; bottom: 22px; right: 22px; background: var(--accent); color: #06281c; padding: 10px 18px; border-radius: 10px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9; }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--red); color: #2b0707; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="ball">●</span> WC26 MATCH CENTER</h1>
    <span class="sub">Elo · Dixon-Coles core · tactical layer · personal build</span>
    <span class="sub" style="margin-left:auto">
      Venue:
      <select id="venue" style="width:auto;display:inline-block;padding:4px 8px">
        <option value="">Neutral</option><option value="A">Team A home</option><option value="B">Team B home</option>
      </select>
    </span>
  </header>

  <div class="layout">
    <!-- TEAM A -->
    <div class="card">
      <h2>Team A</h2>
      <select id="teamA"></select>
      <label>Tactical approach</label>
      <div class="seg" id="segA"></div>
      <div class="styleName" id="styleNameA">BALANCED</div>
      <label>Formation</label>
      <select id="formationA">
        <option>4-3-3</option><option>4-2-3-1</option><option>4-4-2</option><option>4-1-4-1</option>
        <option>3-5-2</option><option>3-4-3</option><option>5-4-1</option><option>5-3-2</option><option>4-5-1</option>
      </select>
      <div class="pitch" id="pitchA"></div>
      <div class="loadRow">
        <button class="btn" id="autoA">⭐ Auto XI</button>
        <input type="text" id="fixtureA" placeholder="fixture id">
        <button class="btn" id="loadA">Load XI</button>
      </div>
      <datalist id="dlA"></datalist>
    </div>

    <!-- CENTER -->
    <div class="card">
      <h2 style="text-align:center">Prediction</h2>
      <div class="matchTitle" id="title">—</div>
      <div id="probs"></div>
      <div class="statChips" id="chips"></div>
      <div class="scores" id="scores"></div>
      <div class="baselineNote" id="baselineNote"></div>
      <div class="cornersCard">
        <h2 style="text-align:center">Corners (estimate)</h2>
        <div class="cornersGrid" id="corners"></div>
      </div>
      <label>Notes / reasoning (saved with prediction)</label>
      <textarea id="reasoning" rows="2" placeholder="Why this setup — injuries, style matchup, form…"></textarea>
      <button class="saveBtn" id="saveBtn">Save prediction</button>
    </div>

    <!-- TEAM B -->
    <div class="card">
      <h2>Team B</h2>
      <select id="teamB"></select>
      <label>Tactical approach</label>
      <div class="seg" id="segB"></div>
      <div class="styleName" id="styleNameB">BALANCED</div>
      <label>Formation</label>
      <select id="formationB">
        <option>4-3-3</option><option>4-2-3-1</option><option>4-4-2</option><option>4-1-4-1</option>
        <option>3-5-2</option><option>3-4-3</option><option>5-4-1</option><option>5-3-2</option><option>4-5-1</option>
      </select>
      <div class="pitch" id="pitchB"></div>
      <div class="loadRow">
        <button class="btn" id="autoB">⭐ Auto XI</button>
        <input type="text" id="fixtureB" placeholder="fixture id">
        <button class="btn" id="loadB">Load XI</button>
      </div>
      <datalist id="dlB"></datalist>
    </div>
  </div>

  <!-- INTEL -->
  <div class="intelGrid">
    <div class="card"><h2 id="intelTitleA">Team A — form</h2><div id="intelA"></div></div>
    <div class="card"><h2>Head to head <span style="text-transform:none;letter-spacing:0">(since Oct 2023)</span></h2><div id="h2h"></div></div>
    <div class="card"><h2 id="intelTitleB">Team B — form</h2><div id="intelB"></div></div>
  </div>

  <div class="card logCard">
    <h2>Prediction log</h2>
    <div style="overflow-x:auto"><table id="log"><thead>
      <tr><th>date</th><th>match</th><th>setup</th><th>model (1X2)</th><th>top score</th><th>corners est</th><th>actual</th><th>result</th></tr>
    </thead><tbody></tbody></table></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="pcard"></div>

<script>
const $ = (id) => document.getElementById(id);
const pct = (x) => (x * 100).toFixed(1) + "%";
const pct0 = (x) => (x * 100).toFixed(0) + "%";
const cap = (s) => String(s).split("-").map(w => w ? w[0].toUpperCase() + w.slice(1) : w).join(" ");
const STYLE_NAMES = { "-2": "VERY DEFENSIVE", "-1": "DEFENSIVE", "0": "BALANCED", "1": "ATTACKING", "2": "VERY ATTACKING", "auto": "AUTO" };
const STYLE_ICONS = { "-2": "🛡🛡", "-1": "🛡", "0": "⚖", "1": "⚔", "2": "⚔⚔", "auto": "🧬" };
let styles = { A: "auto", B: "auto" };
let debounce = null;
let pool = { A: [], B: [] };       // player arrays per side
let poolMap = { A: {}, B: {} };    // name → player

/* ---------- player database ---------- */
async function loadPool(side) {
  const team = $("team" + side).value;
  pool[side] = await (await fetch(`/api/players?team=${team}`)).json();
  poolMap[side] = Object.fromEntries(pool[side].map(p => [p.name, p]));
  $("dl" + side).innerHTML = pool[side].map(p =>
    `<option value="${p.name.replace(/"/g, "&quot;")}" label="${p.ovr} · ${p.positions[0]} · ${p.club ?? "—"}"></option>`).join("");
  refreshBadges(side);
}

function ovrClass(ovr) { return ovr >= 80 ? "gold" : ovr >= 73 ? "silver" : "bronze"; }

function refreshBadges(side) {
  for (const chip of $("pitch" + side).querySelectorAll(".chip")) {
    const inp = chip.querySelector("input");
    const badge = chip.querySelector(".ovr");
    const p = poolMap[side][inp.value.trim()];
    if (p) { badge.textContent = p.ovr; badge.className = "ovr " + ovrClass(p.ovr); badge.style.display = "block"; }
    else badge.style.display = "none";
  }
}

/* hover card */
const STAT_COLOR = (v) => v >= 85 ? "#34d399" : v >= 75 ? "#a3e635" : v >= 65 ? "#fbbf24" : "#f87171";
function showCard(p, x, y) {
  const card = $("pcard");
  card.className = p.ovr >= 80 ? "" : "silver";
  card.innerHTML = `
    <div class="top">
      ${p.face ? `<img src="${p.face}" onerror="this.style.display='none'">` : ""}
      <div>
        <div class="big">${p.ovr}</div>
        <div class="pos">${p.positions.join(" · ")}</div>
        <div class="nm">${p.name}</div>
      </div>
    </div>
    <div class="meta">${p.club ?? "no club"} · age ${p.age} · ${p.height}cm · ${p.foot ?? "?"} foot · pot ${p.pot}</div>
    <div class="sgrid">${Object.entries(p.stats).filter(([, v]) => v != null).map(([k, v]) => `
      <div class="srow"><span class="k">${k}</span><span class="t"><span class="f" style="width:${v}%;background:${STAT_COLOR(v)}"></span></span><span class="v" style="color:${STAT_COLOR(v)}">${v}</span></div>`).join("")}
    </div>`;
  card.style.display = "block";
  const r = card.getBoundingClientRect();
  card.style.left = Math.min(x + 14, innerWidth - r.width - 10) + "px";
  card.style.top = Math.min(Math.max(y - r.height / 2, 8), innerHeight - r.height - 8) + "px";
}
function hideCard() { $("pcard").style.display = "none"; }

function bindHover(side) {
  const pitch = $("pitch" + side);
  pitch.addEventListener("mouseover", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    const p = poolMap[side][chip.querySelector("input").value.trim()];
    if (p) showCard(p, e.clientX, e.clientY);
  });
  pitch.addEventListener("mousemove", (e) => {
    if ($("pcard").style.display === "block" && e.target.closest(".chip")) {
      const p = poolMap[side][e.target.closest(".chip").querySelector("input").value.trim()];
      if (p) showCard(p, e.clientX, e.clientY);
    }
  });
  pitch.addEventListener("mouseout", (e) => { if (!e.relatedTarget?.closest?.(".chip")) hideCard(); });
}

/* auto XI: greedy best-rated per slot position */
const SLOT_FITS = {
  GK: ["GK"], CB: ["CB"], LB: ["LB", "LWB"], RB: ["RB", "RWB"],
  LWB: ["LWB", "LB", "LM"], RWB: ["RWB", "RB", "RM"],
  CM: ["CM", "CDM", "CAM"], LM: ["LM", "LW", "CM"], RM: ["RM", "RW", "CM"],
  LW: ["LW", "LM", "CF", "ST"], RW: ["RW", "RM", "CF", "ST"], ST: ["ST", "CF", "LW", "RW"],
};
function autoXI(side) {
  const chips = [...$("pitch" + side).querySelectorAll(".chip")];
  const used = new Set();
  const picks = new Array(chips.length).fill(null);
  // pass 1: walk each slot's fit list in priority order — a natural LB beats a
  // converted LM for the LB slot even at lower rating
  chips.forEach((chip, i) => {
    const slot = chip.querySelector(".pos").textContent;
    for (const fitPos of SLOT_FITS[slot] ?? []) {
      const p = pool[side].find(p => !used.has(p) && p.positions.includes(fitPos));
      if (p) { picks[i] = p; used.add(p); break; }
    }
  });
  // pass 2: fill gaps with best remaining (never a GK outfield, never an outfielder in goal)
  chips.forEach((chip, i) => {
    if (picks[i]) return;
    const slot = chip.querySelector(".pos").textContent;
    const p = pool[side].find(p => !used.has(p) && (slot === "GK") === (p.positions[0] === "GK"));
    if (p) { picks[i] = p; used.add(p); }
  });
  setPlayers(side, picks.map(p => p?.name ?? ""));
  refreshBadges(side);
  toast(`Best XI picked for ${cap($("team" + side).value)} (FC26 ratings)`);
}

/* ---------- pitch ---------- */
const PITCH_SVG = `<svg viewBox="0 0 300 400" preserveAspectRatio="none">
  <g stroke="var(--pitchline)" stroke-width="2" fill="none">
    <rect x="6" y="6" width="288" height="388" rx="4"/>
    <line x1="6" y1="200" x2="294" y2="200"/>
    <circle cx="150" cy="200" r="34"/>
    <rect x="75" y="6" width="150" height="58"/>
    <rect x="113" y="6" width="74" height="24"/>
    <rect x="75" y="336" width="150" height="58"/>
    <rect x="113" y="370" width="74" height="24"/>
  </g></svg>`;

function rowLabel(rowIdx, rowCount, n, i) {
  if (rowIdx === 0) { // defenders
    if (n === 4) return ["LB", "CB", "CB", "RB"][i];
    if (n === 5) return ["LWB", "CB", "CB", "CB", "RWB"][i];
    if (n === 3) return ["CB", "CB", "CB"][i];
  }
  if (rowIdx === rowCount - 1) { // attackers
    if (n === 3) return ["LW", "ST", "RW"][i];
    if (n === 2) return ["ST", "ST"][i];
    if (n === 1) return ["ST"][i];
  }
  return n >= 4 ? ["LM", "CM", "CM", "RM", "CM"][i] ?? "CM" : "CM";
}

// Render a formation: GK at bottom, defense → attack upward.
function renderPitch(side) {
  const pitch = $("pitch" + side);
  const formation = $("formation" + side).value;
  const old = getPlayers(side); // keep typed names across formation changes
  pitch.innerHTML = PITCH_SVG;
  const rows = formation.split("-").map(Number);
  const slots = [{ x: 50, y: 91, pos: "GK" }];
  rows.forEach((n, r) => {
    const y = 76 - (r + 1) * (62 / (rows.length + 0.4));
    for (let i = 0; i < n; i++) {
      slots.push({ x: n === 1 ? 50 : 10 + (80 / (n - 1)) * i, y, pos: rowLabel(r, rows.length, n, i) });
    }
  });
  slots.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "chip";
    div.style.left = s.x + "%"; div.style.top = s.y + "%";
    div.innerHTML = `<div class="pos">${s.pos}</div><input data-slot="${i}" placeholder="${s.pos}" list="dl${side}" value="${old[i] ?? ""}"><span class="ovr"></span>`;
    pitch.appendChild(div);
  });
  for (const inp of pitch.querySelectorAll("input")) {
    inp.addEventListener("change", () => { persistLineup(side); refreshBadges(side); });
    inp.addEventListener("input", () => refreshBadges(side));
  }
  refreshBadges(side);
}

function getPlayers(side) {
  return [...$("pitch" + side).querySelectorAll("input")].map(i => i.value.trim());
}
function setPlayers(side, names) {
  const inputs = [...$("pitch" + side).querySelectorAll("input")];
  inputs.forEach((inp, i) => inp.value = names[i] ?? "");
  persistLineup(side);
  refreshBadges(side);
}
function persistLineup(side) {
  const team = $("team" + side).value;
  localStorage.setItem("wc26_" + team, JSON.stringify({ formation: $("formation" + side).value, players: getPlayers(side) }));
}
function restoreLineup(side) {
  const saved = localStorage.getItem("wc26_" + $("team" + side).value);
  if (saved) {
    const { formation, players } = JSON.parse(saved);
    $("formation" + side).value = formation;
    renderPitch(side);
    setPlayers(side, players);
  } else {
    renderPitch(side);
  }
}

/* ---------- style segments ---------- */
function buildSeg(side) {
  const seg = $("seg" + side);
  seg.innerHTML = "";
  for (const v of ["auto", "-2", "-1", "0", "1", "2"]) {
    const b = document.createElement("button");
    b.textContent = STYLE_ICONS[v];
    b.title = v === "auto" ? "Auto — detected from real results" : STYLE_NAMES[v] + " (what-if override)";
    b.dataset.v = v;
    if (v === String(styles[side])) b.classList.add("on");
    b.addEventListener("click", () => {
      styles[side] = v === "auto" ? "auto" : parseInt(v, 10);
      for (const x of seg.children) x.classList.toggle("on", x === b);
      refresh();
    });
    seg.appendChild(b);
  }
}

// styleName line under the segments: detected DNA in auto, override name otherwise
function describeStyle(side, dna) {
  const el = $("styleName" + side);
  if (styles[side] === "auto") {
    const fmt = (x) => (x >= 1 ? "+" : "") + ((x - 1) * 100).toFixed(0) + "%";
    el.innerHTML = `🧬 ${dna.label.toUpperCase()}<br>` +
      `<span style="color:var(--dim)">scores ${fmt(dna.attack)} · concedes ${fmt(dna.leak)} vs Elo exp. (${dna.n} games)</span>`;
  } else {
    el.textContent = STYLE_NAMES[styles[side]] + " (override)";
  }
}

/* ---------- prediction ---------- */
async function refresh() {
  const a = $("teamA").value, b = $("teamB").value;
  if (!a || !b || a === b) { $("title").textContent = "pick two different teams"; return; }
  const home = $("venue").value === "A" ? a : $("venue").value === "B" ? b : "";
  const q = new URLSearchParams({ a, b, home, sa: styles.A, sb: styles.B });
  const d = await (await fetch("/api/predict?" + q)).json();
  if (d.error) { $("title").textContent = d.error; return; }
  const f = d.adjusted ?? d.baseline;
  describeStyle("A", d.dnaA); describeStyle("B", d.dnaB);
  const styleTxt = (s, dna) => s === "auto" ? dna.label : STYLE_NAMES[s].toLowerCase();
  $("title").innerHTML = `${cap(d.teamA)} <span class="elo">${d.eloA}</span> &nbsp;v&nbsp; ${cap(d.teamB)} <span class="elo">${d.eloB}</span>` +
    `<div class="elo">${d.home ? cap(d.home) + " at home" : "neutral venue"} · ${styleTxt(styles.A, d.dnaA)} v ${styleTxt(styles.B, d.dnaB)}</div>`;
  const rows = [
    ["winA", cap(d.teamA), f.winA, d.baseline.winA],
    ["draw", "Draw", f.draw, d.baseline.draw],
    ["winB", cap(d.teamB), f.winB, d.baseline.winB],
  ];
  $("probs").innerHTML = rows.map(([cls, lbl, v, base]) => `
    <div class="probRow ${cls}">
      <div class="lbl">${lbl}</div>
      <div class="barTrack"><div class="barFill" style="width:${v * 100}%"></div>
        ${d.adjusted ? `<div class="barGhost" style="left:0;width:${base * 100}%"></div>` : ""}</div>
      <div class="val">${pct(v)}</div>
    </div>`).join("");
  $("chips").innerHTML = `
    <div class="chip2">xG <b>${f.lambda.toFixed(2)} – ${f.mu.toFixed(2)}</b></div>
    <div class="chip2">over 2.5 <b>${pct(f.over25)}</b></div>
    <div class="chip2">both score <b>${pct(f.btts)}</b></div>`;
  $("scores").innerHTML = f.topScorelines.map(s =>
    `<div class="score"><div class="s">${s.score}</div><div class="p">${pct(s.p)}</div></div>`).join("");
  $("baselineNote").textContent = d.adjusted
    ? `dashed = pure Elo baseline (${pct(d.baseline.winA)} / ${pct(d.baseline.draw)} / ${pct(d.baseline.winB)}) · style effect ×${d.mA.toFixed(2)} / ×${d.mB.toFixed(2)}`
    : "pure Elo baseline — set tactical approaches to shape the prediction";
  const c = d.corners;
  $("corners").innerHTML = `
    <div class="chip2">total <b>${c.total.toFixed(1)}</b></div>
    <div class="chip2">${cap(d.teamA)} <b>${c.teamA.toFixed(1)}</b></div>
    <div class="chip2">${cap(d.teamB)} <b>${c.teamB.toFixed(1)}</b></div>
    <div class="chip2">o8.5 <b>${pct0(c.over["8.5"])}</b></div>
    <div class="chip2">o9.5 <b>${pct0(c.over["9.5"])}</b></div>
    <div class="chip2">o10.5 <b>${pct0(c.over["10.5"])}</b></div>
    <div class="chip2">o11.5 <b>${pct0(c.over["11.5"])}</b></div>`;
}

/* ---------- intel ---------- */
function pillRow(tag, rows) {
  const s = rows.reduce((acc, r) => { acc[r.result]++; acc.gf += r.gf; acc.ga += r.ga; return acc; }, { W: 0, D: 0, L: 0, gf: 0, ga: 0 });
  return `<div class="pillRow"><span class="tag">${tag}</span>` +
    rows.map(r => `<span class="pill ${r.result}" title="${r.date} ${r.venue === "H" ? "vs" : "@"} ${cap(r.opponentName)} ${r.gf}-${r.ga}">${r.result}</span>`).join("") +
    `<span class="agg">${s.gf}-${s.ga}</span></div>`;
}
function formList(rows) {
  return `<div class="formList">` + rows.map(r =>
    `<div><span class="r ${r.result}">${r.result}</span><span>${r.gf}-${r.ga}</span><span>${r.venue === "H" ? "vs" : "@"} ${cap(r.opponentName)}</span><span style="margin-left:auto">${r.date.slice(5)}</span></div>`).join("") + `</div>`;
}
async function loadIntel() {
  const a = $("teamA").value, b = $("teamB").value;
  if (!a || !b || a === b) return;
  const d = await (await fetch(`/api/intel?a=${a}&b=${b}`)).json();
  $("intelTitleA").textContent = cap(a) + " — form";
  $("intelTitleB").textContent = cap(b) + " — form";
  $("intelA").innerHTML = pillRow("last 5", d.formA.overall) + pillRow("home", d.formA.home) + pillRow("away", d.formA.away) + formList(d.formA.overall);
  $("intelB").innerHTML = pillRow("last 5", d.formB.overall) + pillRow("home", d.formB.home) + pillRow("away", d.formB.away) + formList(d.formB.overall);
  $("h2h").innerHTML = d.h2h.length
    ? d.h2h.map(m => `<div class="h2hRow"><span>${m.date}</span><span class="sc">${m.gf}-${m.ga}</span><span>${cap(m.perspective)} ${m.venue === "H" ? "(H)" : "(A)"}</span><span style="margin-left:auto;color:var(--dim)">${m.league}</span></div>`).join("")
    : `<div class="empty">No meetings since Oct 2023 in the dataset.</div>`;
}

/* ---------- lineups via API ---------- */
async function loadXI(side) {
  const fixture = $("fixture" + side).value.trim();
  if (!fixture) return toast("Enter a fixture id (api-football)", true);
  const d = await (await fetch(`/api/lineups?fixture=${fixture}`)).json();
  if (d.error) return toast(d.error, true);
  if (!d.length) return toast("Lineups not published yet (~1h before KO)", true);
  const want = cap($("team" + side).value).toLowerCase();
  const t = d.find(x => x.team.toLowerCase().includes(want.split(" ")[0])) ?? d[side === "A" ? 0 : 1];
  if (t.formation) {
    const sel = $("formation" + side);
    if (![...sel.options].some(o => o.value === t.formation)) sel.add(new Option(t.formation, t.formation));
    sel.value = t.formation;
    renderPitch(side);
  }
  setPlayers(side, t.startXI.map(p => p.name));
  toast(`${t.team} XI loaded (${t.formation})`);
}

/* ---------- save & log ---------- */
async function savePrediction() {
  const teamA = $("teamA").value, teamB = $("teamB").value;
  if (!teamA || !teamB || teamA === teamB) return;
  const home = $("venue").value === "A" ? teamA : $("venue").value === "B" ? teamB : null;
  const res = await (await fetch("/api/save", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      teamA, teamB, home, styleA: styles.A, styleB: styles.B,
      formationA: $("formationA").value, formationB: $("formationB").value,
      lineupA: getPlayers("A"), lineupB: getPlayers("B"),
      reasoning: $("reasoning").value,
    }),
  })).json();
  toast(res.saved ? "Saved " + res.saved : "Error: " + res.error, !res.saved);
  loadLog();
}

async function loadLog() {
  const logs = await (await fetch("/api/predictions")).json();
  $("log").querySelector("tbody").innerHTML = logs.map(l => {
    const f = l.adjusted ?? l.baseline;
    const top = f.topScorelines[0];
    let result = "—";
    if (l.actual) {
      const out = l.actual.goalsA > l.actual.goalsB ? "winA" : l.actual.goalsA < l.actual.goalsB ? "winB" : "draw";
      const predOut = f.winA >= f.draw && f.winA >= f.winB ? "winA" : f.winB >= f.draw ? "winB" : "draw";
      result = `<span class="${out === predOut ? "hit" : "miss"}">${out === predOut ? "✓ hit" : "✗ miss"}</span>`;
    }
    const setup = (l.styleA !== undefined) ? `${l.formationA ?? "?"} ${STYLE_ICONS[String(l.styleA ?? "auto")] ?? "?"} v ${STYLE_ICONS[String(l.styleB ?? "auto")] ?? "?"} ${l.formationB ?? "?"}` : "—";
    const actualCell = l.actual
      ? `${l.actual.goalsA}-${l.actual.goalsB}`
      : `<input class="actualIn" id="ga_${l.file}" type="number" min="0"> – <input class="actualIn" id="gb_${l.file}" type="number" min="0">
         <button class="okBtn" data-file="${l.file}">ok</button>`;
    return `<tr>
      <td>${l.date.slice(0, 10)}</td>
      <td>${cap(l.teamA)} v ${cap(l.teamB)}</td>
      <td>${setup}</td>
      <td>${pct(f.winA)} / ${pct(f.draw)} / ${pct(f.winB)}</td>
      <td>${top.score} (${pct(top.p)})</td>
      <td>${l.corners ? l.corners.total.toFixed(1) : "—"}</td>
      <td>${actualCell}</td>
      <td>${result}</td>
    </tr>`;
  }).join("") || `<tr><td colspan="8" class="empty" style="padding:10px">no saved predictions yet</td></tr>`;
}

async function setActual(file) {
  const goalsA = $("ga_" + file).value, goalsB = $("gb_" + file).value;
  if (goalsA === "" || goalsB === "") return;
  await fetch("/api/actual", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ file, goalsA, goalsB }),
  });
  loadLog();
}

function toast(msg, isErr = false) {
  const t = $("toast");
  t.textContent = msg; t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => t.classList.remove("show"), 2600);
}

/* ---------- init ---------- */
async function init() {
  const teams = await (await fetch("/api/teams")).json();
  for (const sel of [$("teamA"), $("teamB")]) {
    sel.innerHTML = teams.map(t => `<option value="${t.name}">${cap(t.name)} (${t.elo})</option>`).join("");
  }
  $("teamA").value = "mexico"; $("teamB").value = "south-africa"; $("venue").value = "A";
  buildSeg("A"); buildSeg("B");
  restoreLineup("A"); restoreLineup("B");
  await Promise.all([loadPool("A"), loadPool("B")]);
  bindHover("A"); bindHover("B");
  for (const id of ["teamA", "teamB"]) $(id).addEventListener("change", () => {
    const side = id === "teamA" ? "A" : "B";
    restoreLineup(side); loadPool(side); refresh(); loadIntel();
  });
  $("venue").addEventListener("change", refresh);
  $("formationA").addEventListener("change", () => { renderPitch("A"); persistLineup("A"); });
  $("formationB").addEventListener("change", () => { renderPitch("B"); persistLineup("B"); });
  $("saveBtn").addEventListener("click", savePrediction);
  $("loadA").addEventListener("click", () => loadXI("A"));
  $("loadB").addEventListener("click", () => loadXI("B"));
  $("autoA").addEventListener("click", () => autoXI("A"));
  $("autoB").addEventListener("click", () => autoXI("B"));
  $("log").addEventListener("click", (e) => { if (e.target.dataset?.file) setActual(e.target.dataset.file); });
  refresh(); loadIntel(); loadLog();
}
init();
</script>
</body>
</html>
